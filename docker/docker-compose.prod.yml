services:
  postgres:
    image: agnohq/pgvector:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${LUMEN_POSTGRES_BIND:-127.0.0.1}:${LUMEN_POSTGRES_PORT:-5532}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    ports:
      - "${LUMEN_BACKEND_BIND:-127.0.0.1}:${LUMEN_BACKEND_PORT:-8000}:8000"
    volumes:
      - ${LUMEN_APP_PATH:?set LUMEN_APP_PATH in docker/.env}/backend/data:/app/data
      - ${LUMEN_APP_PATH:?set LUMEN_APP_PATH in docker/.env}/backend/.env:/app/.env:ro
    environment:
      - DATABASE_URL=postgresql+psycopg://ai:ai@postgres:5432/ai
      - LLM_PROVIDER=openai
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_REDIRECT_URL: ${VITE_SUPABASE_REDIRECT_URL:-http://localhost:3000}
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_ENABLED_PERSONAS: ${VITE_ENABLED_PERSONAS:-kardec}
    restart: unless-stopped
    ports:
      - "${LUMEN_FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  pgdata:
