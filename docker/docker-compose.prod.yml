services:
  postgres:
    image: agnohq/pgvector:16
    container_name: lumen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webnet

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: lumen-backend
    restart: unless-stopped
    volumes:
      - ${LUMEN_APP_PATH:?set LUMEN_APP_PATH in docker/.env}/backend/data:/app/data
      - ${LUMEN_APP_PATH:?set LUMEN_APP_PATH in docker/.env}/backend/.env:/app/.env:ro
    environment:
      - DATABASE_URL=postgresql+psycopg://ai:ai@postgres:5432/ai
      - LLM_PROVIDER=openai
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - webnet

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_REDIRECT_URL: ${VITE_SUPABASE_REDIRECT_URL:-http://localhost:3000}
        VITE_API_BASE: ${VITE_API_BASE:-}
        VITE_ENABLED_PERSONAS: ${VITE_ENABLED_PERSONAS:-kardec}
    container_name: lumen-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - webnet
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.lumen.rule=Host(`lumen.kardechat.com.br`)"
      - "traefik.http.routers.lumen.entrypoints=web"
      - "traefik.http.services.lumen.loadbalancer.server.port=80"

volumes:
  pgdata:

networks:
  webnet:
    driver: bridge
  proxy:
    external: true
