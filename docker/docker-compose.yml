version: "3.8"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../backend/data:/app/data
      - model-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro

volumes:
  model-cache:
